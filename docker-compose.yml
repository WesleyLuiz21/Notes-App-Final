version: '3.8'

services:
  notes-api:
    build: ./backend
    container_name: notes-api
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_PATH: /data/app.db
    volumes:
      - /srv/notes/db:/data
    ports:
      - "127.0.0.1:3001:3001"
